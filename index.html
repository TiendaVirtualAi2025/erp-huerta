    <!-- Modal Status -->
    <div id="statusModal" class="fixed inset-0 bg-slate-900/70 hidden flex items-center justify-center p-6 z-50">

    <script>
        // Configuración de camas 
        const huertasConfig = { "H1": 59, "H2": 30, "H3": 50 };
        
        // Obtener URL configurada desde localStorage
        let WEB_APP_URL = localStorage.getItem("erpUrlScript") || "";

        // 1. FECHAS LOCALES ROBUSTAS
        window.onload = () => {
            const formatter = new Intl.DateTimeFormat('en-CA', { 
                timeZone: 'America/Bogota', 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit' 
            });
            const hoy = formatter.format(new Date());
            document.querySelectorAll('.fecha-hoy').forEach(el => el.value = hoy);
            
            // Actualizar vista de configuración
            if(WEB_APP_URL) {
                document.getElementById('url-config-input').value = WEB_APP_URL;
                document.getElementById('url-status').innerHTML = "✅ Configurada y guardada en este celular";
                document.getElementById('url-status').className = "text-xs text-center mt-3 font-semibold text-green-600";
            }
        };

        // Generador Dinámico de Camas
        function actualizarCamas(selectHuertaId, selectCamaId) {
            const huerta = document.getElementById(selectHuertaId).value;
            const selectCama = document.getElementById(selectCamaId);
            selectCama.innerHTML = '<option value="">-- Elige Cama --</option>';
            if(!huerta) return;

            for(let i = 1; i <= huertasConfig[huerta]; i++) {
                const numStr = i < 10 ? '0' + i : i; 
                const camaId = `${huerta}-C${numStr}`;
                selectCama.innerHTML += `<option value="${camaId}">${camaId}</option>`;
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('active-tab');
        }

        function closeModal() {
            document.getElementById('statusModal').classList.add('hidden');
        }
        
        // Configuración Dinámica de la URL
        function guardarUrl() {
            const url = document.getElementById('url-config-input').value.trim();
            if(!url || !url.includes("script.google.com")) {
                alert("Por favor ingresa una URL válida de Google Apps Script.");
                return;
            }
            WEB_APP_URL = url;
            localStorage.setItem("erpUrlScript", url);
            document.getElementById('url-status').innerHTML = "✅ Guardada con éxito";
            document.getElementById('url-status').className = "text-xs text-center mt-3 font-semibold text-green-600";
            alert("URL configurada. Ahora puedes usar todos los módulos.");
        }

        // HEALTH CHECK
        async function pingServer() {
            if (!WEB_APP_URL) {
                alert("Primero debes ir a la pestaña ⚙️ Config y pegar la URL de Apps Script.");
                return;
            }
            try {
                const res = await fetch(WEB_APP_URL);
                const data = await res.json();
                alert(`Conexión exitosa 🟢\nStatus: ${data.status}\nVersión: ${data.version}`);
            } catch (err) {
                alert("Fallo de conexión 🔴. Revisa la URL en la pestaña Config o tu red de internet.");
            }
        }

        // ESTRATEGIA DE ENVÍO Y CONFIRMACIÓN HONESTA
        async function handleSubmit(e) {
            e.preventDefault();
            if (!WEB_APP_URL) {
                alert("Debes configurar la URL del script en la pestaña ⚙️ Config.");
                showTab('config');
                return;
            }

            const modal = document.getElementById('statusModal');
            const btnCerrar = document.getElementById('btnCerrarModal');
            const form = e.target;
            const data = Object.fromEntries(new FormData(form).entries());

            modal.classList.remove('hidden');
            btnCerrar.classList.add('hidden');
            document.getElementById('statusIcon').innerText = "🚀";
            document.getElementById('statusTitle').innerText = "Transmitiendo datos";
            document.getElementById('statusMsg').innerText = "El navegador está enviando la información...";

            try {
                // 1. POST Ciego
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });

                // 2. Ping de verificación del servidor online
                document.getElementById('statusIcon').innerText = "📡";
                document.getElementById('statusMsg').innerText = "Comprobando conexión del servidor...";
                
                const verifyRes = await fetch(WEB_APP_URL);
                
                if (verifyRes.ok) {
                    document.getElementById('statusIcon').innerText = "✅";
                    document.getElementById('statusIcon').classList.remove('animate-pulse');
                    document.getElementById('statusTitle').innerText = "¡Envío Confirmado!";
                    document.getElementById('statusMsg').innerText = "El dato se envió. Si el servidor respondió bien, se guardó en el Excel.";
                    form.reset();
                    window.onload(); // Restablecer fecha local
                } else {
                    throw new Error("Sin respuesta del GET");
                }

            } catch (error) {
