<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ERP Huerta - Estable</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --g1: #1a3d2b; --g2: #2d6a4f; --g3: #40916c; --g4: #52b788; --g5: #95d5b2; --g6: #d8f3dc;
    --am: #e07a31; --am-p: #fff3e0; --rd: #c0392b; --rd-p: #fdecea;
    --bl: #1565c0; --bl-p: #e3f2fd;
    --bg: #f2efe8; --bg2: #e8e4db; --card: #fff;
    --txt: #1a1a1a; --txt2: #555; --txt3: #888;
    --bdr: #e0ddd5;
    --r: 14px; --r2: 10px; --r3: 6px;
    --f: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--f); background: var(--bg); color: var(--txt); }
  .hdr { background: var(--g1); position: sticky; top: 0; z-index: 200; }
  .hdr-top { max-width: 500px; margin: 0 auto; display: flex; align-items: center; padding: 12px 16px; gap: 8px; }
  .hdr-top h1 { flex: 1; font-size: 15px; font-weight: 700; color: #fff; }
  .sync-btn, .cfg-btn { background: none; border: 1px solid rgba(255,255,255,.3); color: white; padding: 6px 11px; border-radius: 20px; font-size: 11px; cursor: pointer; }
  .nav { background: var(--g2); }
  .nav-inner { max-width: 500px; margin: 0 auto; display: flex; }
  .nb { flex: 1; padding: 10px; border: none; background: none; color: rgba(255,255,255,.55); font-weight: 600; font-size: 9.5px; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent; }
  .nb.on { color: #fff; border-bottom-color: var(--g4); }
  .wrap { max-width: 500px; margin: 0 auto; padding: 12px 14px 90px; }
  .view { display: none; }
  .view.on { display: block; }
  .toast { position: fixed; top: 68px; left: 50%; transform: translateX(-50%); background: var(--g1); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; z-index: 999; opacity: 0; transition: 0.25s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 10px; }
  .kpi { background: var(--card); border-radius: var(--r2); padding: 13px; border: 1px solid var(--bdr); }
  .kpi-lbl { font-size: 10px; font-weight: 600; color: var(--txt3); text-transform: uppercase; }
  .kpi-val { font-size: 28px; font-weight: 700; color: var(--g2); }
  .sec { margin: 16px 0 8px; font-size: 11px; font-weight: 700; color: var(--txt2); text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
  .sec::after { content: ''; flex: 1; height: 1px; background: var(--bdr); }
  .ac { background: var(--card); border-radius: var(--r2); border: 1px solid var(--bdr); margin-bottom: 7px; padding: 11px 13px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .ac-p { width: 4px; background: var(--rd); border-radius: 2px; align-self: stretch; }
  .fcard { background: var(--card); border-radius: var(--r2); border: 1px solid var(--bdr); padding: 15px; margin-bottom: 9px; }
  .fcard-ttl { font-size: 11px; font-weight: 700; color: var(--g2); border-bottom: 1px solid var(--bdr); padding-bottom: 9px; margin-bottom: 13px; }
  .fld { margin-bottom: 11px; }
  .fld label { display: block; font-size: 11px; font-weight: 600; color: var(--txt2); margin-bottom: 4px; }
  .fld input, .fld select, .fld textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--bdr); border-radius: var(--r3); font-family: var(--f); font-size: 14px; background: var(--bg); }
  .autofill { background: #f0fff4 !important; color: var(--g2) !important; border-color: #b7e4c7 !important; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .sbtn { width: 100%; background: var(--g2); color: #fff; border: none; padding: 15px; border-radius: var(--r2); font-weight: 700; cursor: pointer; margin-top: 4px; }
  .mod-pick { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-bottom: 10px; }
  .mpk { padding: 10px 4px; border: 1.5px solid var(--bdr); border-radius: var(--r2); background: var(--bg); font-size: 10px; font-weight: 600; cursor: pointer; text-align: center; }
  .mpk.on { background: var(--g2); color: #fff; border-color: var(--g2); }
  .hist-item { background: var(--card); border-radius: var(--r2); border: 1px solid var(--bdr); margin-bottom: 8px; }
  .hist-hdr { display: flex; justify-content: space-between; padding: 10px 13px; background: var(--bg); border-bottom: 1px solid var(--bdr); }
  .hist-mod { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; background: var(--g6); color: var(--g2); }
  .empty { text-align: center; padding: 30px; color: var(--txt3); }
  .chip { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 10px; margin: 2px; background: var(--bg2); cursor: pointer; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<header class="hdr">
  <div class="hdr-top">
    <h1>🌱 ERP Huerta <span>Finca San José</span></h1>
    <button class="sync-btn" onclick="sincronizar()">↻ Sync</button>
    <button class="cfg-btn" onclick="mostrarConfiguracion()">⚙</button>
  </div>
  <div class="nav">
    <div class="nav-inner">
      <button class="nb on" onclick="mostrarPanel('panel')">Panel</button>
      <button class="nb" onclick="mostrarPanel('form')">Registrar</button>
      <button class="nb" onclick="mostrarPanel('camas')">Camas</button>
      <button class="nb" onclick="mostrarPanel('equipo')">Equipo</button>
      <button class="nb" onclick="mostrarPanel('historial')">Historial</button>
    </div>
  </div>
</header>

<main class="wrap">
  <!-- PANEL PRINCIPAL -->
  <div id="panel" class="view on">
    <div style="padding: 8px 0;">
      <div id="saludo" style="font-size: 20px; font-weight: 700;"></div>
      <div id="fecha" style="font-size: 12px; color: var(--txt3);"></div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-lbl">Camas activas</div><div class="kpi-val" id="camasActivas">—</div></div>
      <div class="kpi"><div class="kpi-lbl">Listas cosechar</div><div class="kpi-val" id="listasCosechar">—</div></div>
      <div class="kpi"><div class="kpi-lbl">Camas vacías</div><div class="kpi-val" id="camasVacias">—</div></div>
      <div class="kpi"><div class="kpi-lbl">Equipo</div><div class="kpi-val" id="totalEquipo">—</div></div>
    </div>
    <div class="sec">⚠ Alertas</div>
    <div id="alertas"></div>
    <div class="sec">📦 Stock de insumos</div>
    <div id="stockList"></div>
  </div>

  <!-- FORMULARIO -->
  <div id="form" class="view">
    <div class="mod-pick">
      <button class="mpk on" onclick="setModo('bit',this)">📋 Bitácora</button>
      <button class="mpk" onclick="setModo('gest',this)">👥 Gestión H.</button>
      <button class="mpk" onclick="setModo('riego',this)">💧 Riego</button>
      <button class="mpk" onclick="setModo('cos',this)">🧺 Cosecha</button>
      <button class="mpk" onclick="setModo('ins',this)">📦 Insumos</button>
    </div>
    <div style="background: var(--card); border-radius: var(--r2); padding: 11px; margin-bottom: 9px; display: flex; gap: 10px;">
      <label>📅 Fecha</label>
      <input type="date" id="fechaForm" style="flex:1;">
    </div>
    <form id="formPrincipal" onsubmit="return guardarRegistro(event)">
      <!-- BITÁCORA -->
      <div id="modBit" class="fmod">
        <div class="fcard">
          <div class="fcard-ttl">Bitácora Diaria</div>
          <div class="row2">
            <div class="fld"><label>Cama</label><select name="camaId" id="camaBit"></select></div>
            <div class="fld"><label>Huerta</label><input id="huertaBit" class="autofill" readonly></div>
          </div>
          <div class="fld"><label>Cultivo</label><input id="cultivoBit" class="autofill" readonly></div>
          <div class="row2">
            <div class="fld"><label>Fase</label><select name="fase" id="faseBit"></select></div>
            <div class="fld"><label>% Avance</label><input type="number" name="avance" min="0" max="100"></div>
          </div>
          <div class="row2">
            <div class="fld"><label>Estado fitosanitario</label><select name="estadoFitosan" id="estadoFitoBit"></select></div>
            <div class="fld"><label>Humedad</label><select name="humedad"><option>Óptima</option><option>Seco</option><option>Saturado</option></select></div>
          </div>
          <div class="row2">
            <div class="fld"><label>Altura (cm)</label><input type="number" step="0.1" name="altura"></div>
            <div class="fld"><label>Origen</label><input id="origenBit" class="autofill" readonly></div>
          </div>
          <div class="fld"><label>Acción realizada</label><select name="accion" id="accionBit"></select></div>
          <div class="fld"><label>Responsable</label><select name="responsable" id="responsableBit"></select></div>
          <div class="fld"><label>Alerta</label><input type="text" name="alerta"></div>
          <input type="hidden" name="fechaSiembra" id="fechaSiembraBit">
        </div>
      </div>
      <!-- GESTIÓN HUMANA -->
      <div id="modGest" class="fmod" style="display:none">
        <div class="fcard">
          <div class="fcard-ttl">Gestión Humana</div>
          <div class="fld"><label>Participante</label><select name="joven" id="jovenGest"></select></div>
          <div class="fld"><label>Asistencia</label><select name="asistencia" id="asistenciaGest"><option>Presente</option><option>Ausente</option></select></div>
          <div class="fld"><label>Cama asignada</label><select name="camaAsignada" id="camaGest"></select></div>
          <div class="fld"><label>Tarea</label><input type="text" name="tarea"></div>
          <div class="row2">
            <div class="fld"><label>Desempeño (1-5)</label><select name="actitud"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div>
            <div class="fld"><label>Herramienta</label><input type="text" name="herramienta"></div>
          </div>
          <div class="fld"><label>Insumo entregado</label><input type="text" name="insumoGH"></div>
          <div class="fld"><label>Observaciones</label><input type="text" name="motivoAusencia"></div>
        </div>
      </div>
      <!-- RIEGO -->
      <div id="modRiego" class="fmod" style="display:none">
        <div class="fcard">
          <div class="fcard-ttl">Riego / Fumigación</div>
          <div class="row2">
            <div class="fld"><label>Tipo</label><select name="tipoOperacion"><option>Riego</option><option>Fumigación</option><option>Fertilización</option></select></div>
            <div class="fld"><label>Huerta</label><select id="huertaRiego" name="huertaRiego"></select></div>
          </div>
          <div class="fld"><label>Cama</label><select name="camaRiego" id="camaRiego"></select></div>
          <div class="fld"><label>Producto</label><input type="text" name="producto"></div>
          <div class="row2">
            <div class="fld"><label>Cantidad</label><input type="number" step="0.01" name="cantidadRiego"></div>
            <div class="fld"><label>Unidad</label><input type="text" name="unidadRiego"></div>
          </div>
          <div class="fld"><label>Responsable</label><select name="responsableRiego" id="responsableRiego"></select></div>
        </div>
      </div>
      <!-- COSECHA -->
      <div id="modCos" class="fmod" style="display:none">
        <div class="fcard">
          <div class="fcard-ttl">Registro de Cosecha</div>
          <div class="row2">
            <div class="fld"><label>Cama</label><select name="camaIdCosecha" id="camaCos"></select></div>
            <div class="fld"><label>Huerta</label><input id="huertaCos" class="autofill" readonly></div>
          </div>
          <div class="fld"><label>Cultivo</label><input id="cultivoCos" class="autofill" readonly></div>
          <div class="row2">
            <div class="fld"><label>Cantidad</label><input type="number" step="0.01" name="cantidadCosecha"></div>
            <div class="fld"><label>Unidad</label><select name="unidadCosecha"><option>Kg</option><option>gr</option><option>Unidades</option></select></div>
          </div>
          <div class="row2">
            <div class="fld"><label>Destino</label><select name="destino" id="destinoCos"></select></div>
            <div class="fld"><label>Calidad</label><select name="calidad"><option>Primera</option><option>Segunda</option><option>Rechazo</option></select></div>
          </div>
          <div class="fld"><label>Responsable</label><select name="responsableCosecha" id="responsableCos"></select></div>
        </div>
      </div>
      <!-- INSUMOS -->
      <div id="modIns" class="fmod" style="display:none">
        <div class="fcard">
          <div class="fcard-ttl">Movimiento de Insumos</div>
          <div class="fld"><label>Insumo</label><select name="insumoNombre" id="insumoSelect"></select></div>
          <div class="row2">
            <div class="fld"><label>Categoría</label><input id="categoriaIns" class="autofill" readonly></div>
            <div class="fld"><label>Stock actual</label><input id="stockIns" class="autofill" readonly></div>
          </div>
          <div class="row2">
            <div class="fld"><label>Precio unitario</label><input id="precioIns" class="autofill" readonly></div>
            <div class="fld"><label>Unidad</label><input id="unidadIns" class="autofill" readonly></div>
          </div>
          <div class="fld"><label>Proveedor</label><input type="text" name="proveedor"></div>
          <div class="row2">
            <div class="fld" style="background:#e8f5e9; padding:8px; border-radius:8px;"><label>✚ ENTRADA (+)</label><input type="number" step="0.01" name="cantEntrada"></div>
            <div class="fld" style="background:#ffebee; padding:8px; border-radius:8px;"><label>− SALIDA (−)</label><input type="number" step="0.01" name="cantSalida"></div>
          </div>
        </div>
      </div>
      <div class="fcard"><textarea name="observaciones" rows="2" placeholder="Notas generales..."></textarea></div>
      <button type="submit" class="sbtn">📤 Guardar Registro</button>
    </form>
  </div>

  <!-- CAMAS -->
  <div id="camas" class="view">
    <div class="sec">🗺 Distribución de camas</div>
    <div id="camasContainer"></div>
  </div>

  <!-- EQUIPO -->
  <div id="equipo" class="view">
    <div class="sec">👥 Participantes</div>
    <div id="equipoContainer"></div>
  </div>

  <!-- HISTORIAL -->
  <div id="historial" class="view">
    <div class="sec">Registros guardados</div>
    <div id="historialContainer"></div>
  </div>

  <!-- CONFIGURACIÓN (simple) -->
  <div id="config" class="view" style="display:none">
    <div class="sec">Configuración</div>
    <div class="fcard">
      <div class="fld"><label>URL del Apps Script (opcional)</label><input type="url" id="apiUrl" placeholder="https://script.google.com/.../exec"></div>
      <button class="sbtn" onclick="guardarUrl()">Guardar URL</button>
      <button class="sbtn" style="background:#607d8b;" onclick="cargarDatosEjemplo()">Cargar datos de ejemplo</button>
    </div>
  </div>
</main>

<script>
  // ==================== DATOS POR DEFECTO (ejemplo funcional) ====================
  let datos = {
    camas: [
      { id: "H1-C01", huerta: "H1", num: "1", cultivo: "Arracacha", origen: "Plántula propia", fechaSiembra: "2026-05-04", estado: "En crecimiento" },
      { id: "H1-C02", huerta: "H1", num: "2", cultivo: "Arracacha y ajo", origen: "Plántula propia", fechaSiembra: "", estado: "Cosechada" },
      { id: "H3-C04", huerta: "H3", num: "4", cultivo: "Lechuga", origen: "", fechaSiembra: "", estado: "Lista para cosechar" },
      { id: "H3-C05", huerta: "H3", num: "5", cultivo: "Lechuga", origen: "", fechaSiembra: "", estado: "Lista para cosechar" },
      { id: "H1-C03", huerta: "H1", num: "3", cultivo: "Ajo", origen: "Semilla", fechaSiembra: "", estado: "En crecimiento" },
      { id: "H2-C01", huerta: "H2", num: "1", cultivo: "", origen: "", fechaSiembra: "", estado: "Vacía" }
    ],
    jovenes: ["Juan José Gallego", "José Daniel", "Jhon Esteban Henao", "Hernan", "Participante 5", "Participante 6"],
    fases: ["Preparación suelo","Siembra","Germinación","Crecimiento","Floración","Producción","Cosecha"],
    estadosFito: ["✅ Sano","⚠️ Plaga Controlada","🔴 Plaga Crítica","🟠 Enfermedad","💧 Estrés hídrico"],
    acciones: ["Riego manual","Riego goteo","Fertiliz. orgánica","Control plagas","Poda","Cosecha","Abono compost"],
    destinos: ["Consumo interno","Donación","Venta","Almacenamiento","Semillero"],
    inventario: [
      { nombre: "Compost", categoria: "Fertilizante", unidad: "kg", stock: 200, minimo: 50, precio: 1.5 },
      { nombre: "Aceite Neem", categoria: "Biológico", unidad: "L", stock: 15, minimo: 5, precio: 20 }
    ],
    asistencia: {}
  };

  let historialRegistros = [];
  let modoActual = "bit";
  let apiURL = localStorage.getItem("apiURL") || "";

  // ==================== UTILIDADES ====================
  function mostrarToast(mensaje, esError = false) {
    let toast = document.getElementById("toast");
    toast.textContent = mensaje;
    toast.style.background = esError ? "#c0392b" : "#1a3d2b";
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
  }

  function guardarDatosLocal() {
    localStorage.setItem("datosHuerta", JSON.stringify(datos));
    localStorage.setItem("historialHuerta", JSON.stringify(historialRegistros));
  }

  function cargarDatosLocal() {
    let d = localStorage.getItem("datosHuerta");
    let h = localStorage.getItem("historialHuerta");
    if (d) datos = JSON.parse(d);
    if (h) historialRegistros = JSON.parse(h);
    actualizarInterfaz();
  }

  function actualizarInterfaz() {
    actualizarKPIs();
    poblarSelectores();
    mostrarAlertas();
    mostrarStock();
    mostrarCamas();
    mostrarEquipo();
    mostrarHistorial();
  }

  // ==================== KPI y alertas ====================
  function actualizarKPIs() {
    let activas = datos.camas.filter(c => c.cultivo && c.estado !== "Vacía" && c.estado !== "Cosechada").length;
    let listas = datos.camas.filter(c => c.estado === "Lista para cosechar").length;
    let vacias = datos.camas.filter(c => c.estado === "Vacía").length;
    document.getElementById("camasActivas").innerText = activas;
    document.getElementById("listasCosechar").innerText = listas;
    document.getElementById("camasVacias").innerText = vacias;
    document.getElementById("totalEquipo").innerText = datos.jovenes.length;
  }

  function mostrarAlertas() {
    let alertasDiv = document.getElementById("alertas");
    let alertas = [];
    let listas = datos.camas.filter(c => c.estado === "Lista para cosechar");
    if (listas.length) alertas.push(`🧺 ${listas.length} cama(s) lista(s) para cosechar`);
    let criticos = datos.inventario.filter(i => i.stock <= i.minimo);
    if (criticos.length) alertas.push(`📦 Stock bajo: ${criticos.map(i=>i.nombre).join(", ")}`);
    let vacias = datos.camas.filter(c => c.estado === "Vacía").length;
    if (vacias) alertas.push(`🌱 ${vacias} cama(s) vacía(s) disponibles`);
    if (alertas.length === 0) alertas.push("✅ Todo en orden");
    alertasDiv.innerHTML = alertas.map(a => `<div class="ac"><div class="ac-p"></div><div>${a}</div></div>`).join("");
  }

  function mostrarStock() {
    let stockDiv = document.getElementById("stockList");
    stockDiv.innerHTML = datos.inventario.map(i => `
      <div class="ac" style="justify-content:space-between">
        <div><strong>${i.nombre}</strong><br><span style="font-size:10px">${i.categoria}</span></div>
        <div><span style="font-weight:700">${i.stock} ${i.unidad}</span><br><span style="font-size:10px">$${i.precio}</span></div>
      </div>
    `).join("");
  }

  // ==================== SELECTORES DINÁMICOS ====================
  function poblarSelectores() {
    // Camas activas (con cultivo) para bitácora y cosecha
    let camasActivas = datos.camas.filter(c => c.cultivo && c.estado !== "Vacía");
    let opcionesCama = (idSelect, incluirVacia = false) => {
      let lista = incluirVacia ? datos.camas : camasActivas;
      let select = document.getElementById(idSelect);
      if (!select) return;
      let valorActual = select.value;
      select.innerHTML = '<option value="">Seleccionar...</option>';
      lista.forEach(c => {
        let opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = `${c.id} - ${c.cultivo || "Sin cultivo"}`;
        select.appendChild(opt);
      });
      if (valorActual && [...select.options].some(o=>o.value===valorActual)) select.value = valorActual;
    };
    opcionesCama("camaBit", false);
    opcionesCama("camaCos", false);
    opcionesCama("camaGest", true);
    opcionesCama("camaRiego", true);

    // Huertas para riego
    let huertasUnicas = [...new Set(datos.camas.map(c=>c.huerta))];
    let selectHuerta = document.getElementById("huertaRiego");
    if (selectHuerta) {
      selectHuerta.innerHTML = '<option value="">Todas</option>';
      huertasUnicas.forEach(h => {
        let opt = document.createElement("option");
        opt.value = h;
        opt.textContent = `Huerta ${h}`;
        selectHuerta.appendChild(opt);
      });
      selectHuerta.onchange = () => filtrarCamasPorHuerta();
    }
    filtrarCamasPorHuerta();

    // Jóvenes y responsables
    let opcionesPersonas = (idSelect, incluirJhon = true) => {
      let select = document.getElementById(idSelect);
      if (!select) return;
      let lista = [...datos.jovenes];
      if (incluirJhon) lista.push("Jhon (Instructor)");
      select.innerHTML = lista.map(n => `<option value="${n}">${n}</option>`).join("");
    };
    opcionesPersonas("jovenGest", false);
    opcionesPersonas("responsableBit", true);
    opcionesPersonas("responsableRiego", true);
    opcionesPersonas("responsableCos", true);

    // Listas estáticas
    let rellenaSelect = (id, lista) => {
      let sel = document.getElementById(id);
      if (!sel) return;
      sel.innerHTML = lista.map(v => `<option value="${v}">${v}</option>`).join("");
    };
    rellenaSelect("faseBit", datos.fases);
    rellenaSelect("estadoFitoBit", datos.estadosFito);
    rellenaSelect("accionBit", datos.acciones);
    rellenaSelect("destinoCos", datos.destinos);

    // Insumos
    let selectIns = document.getElementById("insumoSelect");
    if (selectIns) {
      selectIns.innerHTML = datos.inventario.map(i => `<option value="${i.nombre}">${i.nombre}</option>`).join("");
      selectIns.onchange = () => {
        let ins = datos.inventario.find(i => i.nombre === selectIns.value);
        if (ins) {
          document.getElementById("categoriaIns").value = ins.categoria;
          document.getElementById("stockIns").value = `${ins.stock} ${ins.unidad}`;
          document.getElementById("precioIns").value = `$${ins.precio}`;
          document.getElementById("unidadIns").value = ins.unidad;
        }
      };
      if (selectIns.options.length) selectIns.onchange();
    }
  }

  function filtrarCamasPorHuerta() {
    let huerta = document.getElementById("huertaRiego")?.value;
    let selectCama = document.getElementById("camaRiego");
    if (!selectCama) return;
    let lista = huerta ? datos.camas.filter(c => c.huerta === huerta) : datos.camas;
    selectCama.innerHTML = '<option value="">General</option>';
    lista.forEach(c => {
      let opt = document.createElement("option");
      opt.value = c.id;
      opt.textContent = `${c.id} - ${c.cultivo || "Vacía"}`;
      selectCama.appendChild(opt);
    });
  }

  // Auto completar al seleccionar cama
  function configurarAutoCompletado() {
    document.getElementById("camaBit")?.addEventListener("change", function() {
      let cama = datos.camas.find(c => c.id === this.value);
      if (cama) {
        document.getElementById("huertaBit").value = cama.huerta;
        document.getElementById("cultivoBit").value = cama.cultivo || "";
        document.getElementById("origenBit").value = cama.origen || "";
        document.getElementById("fechaSiembraBit").value = cama.fechaSiembra || "";
      } else {
        document.getElementById("huertaBit").value = "";
        document.getElementById("cultivoBit").value = "";
        document.getElementById("origenBit").value = "";
      }
    });
    document.getElementById("camaCos")?.addEventListener("change", function() {
      let cama = datos.camas.find(c => c.id === this.value);
      if (cama) {
        document.getElementById("huertaCos").value = cama.huerta;
        document.getElementById("cultivoCos").value = cama.cultivo || "";
      } else {
        document.getElementById("huertaCos").value = "";
        document.getElementById("cultivoCos").value = "";
      }
    });
  }

  // ==================== RENDER CAMAS Y EQUIPO ====================
  function mostrarCamas() {
    let container = document.getElementById("camasContainer");
    let huertas = [...new Set(datos.camas.map(c=>c.huerta))];
    container.innerHTML = huertas.map(h => {
      let camasH = datos.camas.filter(c => c.huerta === h);
      let chips = camasH.map(c => `<span class="chip" onclick="irARegistrar('${c.id}')">${c.num} - ${c.cultivo?.slice(0,6) || "Vacía"}</span>`).join("");
      return `<div class="fcard"><div class="fcard-ttl">Huerta ${h}</div><div>${chips}</div></div>`;
    }).join("");
  }

  function mostrarEquipo() {
    let container = document.getElementById("equipoContainer");
    container.innerHTML = datos.jovenes.map(j => `<div class="ac" onclick="irAGestionHumana('${j}')">👤 ${j}</div>`).join("");
  }

  function mostrarHistorial() {
    let container = document.getElementById("historialContainer");
    if (historialRegistros.length === 0) {
      container.innerHTML = '<div class="empty">No hay registros aún.</div>';
      return;
    }
    container.innerHTML = historialRegistros.slice(0, 20).map(r => `
      <div class="hist-item">
        <div class="hist-hdr"><span class="hist-mod">${r.tipoRegistro}</span><span>${r.fecha}</span></div>
        <div class="hist-body">${JSON.stringify(r).substring(0, 100)}</div>
      </div>
    `).join("");
  }

  // ==================== GUARDAR REGISTRO (local + sheets) ====================
  async function guardarRegistro(e) {
    e.preventDefault();
    let form = e.target;
    let fd = new FormData(form);
    let fecha = document.getElementById("fechaForm").value;
    let observaciones = fd.get("observaciones") || "";
    let registro = { fecha, observaciones, tipoRegistro: "" };

    if (modoActual === "bit") {
      registro.tipoRegistro = "Bitácora Diaria";
      registro.camaId = fd.get("camaId");
      registro.huerta = document.getElementById("huertaBit").value;
      registro.cultivo = document.getElementById("cultivoBit").value;
      registro.origen = document.getElementById("origenBit").value;
      registro.fase = fd.get("fase");
      registro.avance = fd.get("avance");
      registro.altura = fd.get("altura");
      registro.estadoFitosan = fd.get("estadoFitosan");
      registro.humedad = fd.get("humedad");
      registro.accion = fd.get("accion");
      registro.responsable = fd.get("responsable");
      registro.alerta = fd.get("alerta");
    } else if (modoActual === "gest") {
      registro.tipoRegistro = "Gestión Humana";
      registro.joven = fd.get("joven");
      registro.asistencia = fd.get("asistencia");
      registro.camaAsignada = fd.get("camaAsignada");
      registro.tarea = fd.get("tarea");
      registro.actitud = fd.get("actitud");
      registro.herramienta = fd.get("herramienta");
      registro.insumoGH = fd.get("insumoGH");
      registro.motivoAusencia = fd.get("motivoAusencia");
    } else if (modoActual === "riego") {
      registro.tipoRegistro = "Riego";
      registro.tipoOperacion = fd.get("tipoOperacion");
      registro.huerta = fd.get("huertaRiego");
      registro.camaId = fd.get("camaRiego");
      registro.producto = fd.get("producto");
      registro.cantidad = fd.get("cantidadRiego");
      registro.unidad = fd.get("unidadRiego");
      registro.responsable = fd.get("responsableRiego");
    } else if (modoActual === "cos") {
      registro.tipoRegistro = "Cosecha";
      registro.camaId = fd.get("camaIdCosecha");
      registro.huerta = document.getElementById("huertaCos").value;
      registro.cultivo = document.getElementById("cultivoCos").value;
      registro.cantidad = fd.get("cantidadCosecha");
      registro.unidad = fd.get("unidadCosecha");
      registro.destino = fd.get("destino");
      registro.calidad = fd.get("calidad");
      registro.responsable = fd.get("responsableCosecha");
    } else if (modoActual === "ins") {
      registro.tipoRegistro = "Insumos";
      registro.insumo = fd.get("insumoNombre");
      registro.tipoInsumo = document.getElementById("categoriaIns").value;
      registro.proveedor = fd.get("proveedor");
      registro.precio = document.getElementById("precioIns").value.replace("$","");
      registro.unidad = document.getElementById("unidadIns").value;
      registro.cantEntrada = fd.get("cantEntrada");
      registro.cantSalida = fd.get("cantSalida");
      // Actualizar stock local (simulación)
      let insumo = datos.inventario.find(i => i.nombre === registro.insumo);
      if (insumo) {
        let entrada = parseFloat(registro.cantEntrada) || 0;
        let salida = parseFloat(registro.cantSalida) || 0;
        insumo.stock = insumo.stock + entrada - salida;
        if (insumo.stock < 0) insumo.stock = 0;
        guardarDatosLocal();
        actualizarInterfaz();
      }
    }

    historialRegistros.unshift(registro);
    guardarDatosLocal();
    mostrarToast("✅ Registro guardado localmente");
    form.reset();
    document.getElementById("fechaForm").valueAsDate = new Date();
    actualizarInterfaz();

    // Si hay URL de API, intentar enviar a Google Sheets (sin bloquear)
    if (apiURL) {
      try {
        await fetch(apiURL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(registro)
        });
        mostrarToast("✅ También enviado a Google Sheets");
      } catch (err) {
        console.warn("No se pudo enviar a Sheets:", err);
      }
    }
    return false;
  }

  // ==================== SINCRONIZACIÓN CON GOOGLE SHEETS ====================
  async function sincronizar() {
    if (!apiURL) {
      mostrarToast("⚠️ No hay URL configurada. Ve a configuración (⚙)", true);
      return;
    }
    mostrarToast("Sincronizando...");
    try {
      let res = await fetch(apiURL + "?action=config");
      let data = await res.json();
      if (data.status === "ok" && data.camas) {
        datos.camas = data.camas;
        datos.jovenes = data.jovenes || datos.jovenes;
        datos.fases = data.fases || datos.fases;
        datos.estadosFito = data.estadosFito || datos.estadosFito;
        datos.acciones = data.acciones || datos.acciones;
        datos.destinos = data.destinos || datos.destinos;
        datos.inventario = data.inventario || datos.inventario;
        datos.asistencia = data.asistencia || {};
        guardarDatosLocal();
        actualizarInterfaz();
        mostrarToast("✅ Datos sincronizados desde Google Sheets");
      } else {
        throw new Error("Respuesta inválida");
      }
    } catch (e) {
      mostrarToast("⚠️ Error al sincronizar: " + e.message, true);
    }
  }

  // ==================== NAVEGACIÓN Y CONFIG ====================
  function mostrarPanel(id) {
    document.querySelectorAll(".view").forEach(v => v.style.display = "none");
    document.getElementById(id).style.display = "block";
    document.querySelectorAll(".nb").forEach(b => b.classList.remove("on"));
    let botones = document.querySelectorAll(".nb");
    let indice = { panel:0, form:1, camas:2, equipo:3, historial:4 }[id];
    if (botones[indice]) botones[indice].classList.add("on");
    if (id === "config") cargarUrlEnInput();
  }

  function mostrarConfiguracion() {
    mostrarPanel("config");
  }

  function guardarUrl() {
    let url = document.getElementById("apiUrl").value.trim();
    apiURL = url;
    localStorage.setItem("apiURL", url);
    mostrarToast("URL guardada");
  }

  function cargarUrlEnInput() {
    document.getElementById("apiUrl").value = apiURL;
  }

  function cargarDatosEjemplo() {
    if (confirm("Esto reemplazará tus datos actuales. ¿Continuar?")) {
      localStorage.removeItem("datosHuerta");
      localStorage.removeItem("historialHuerta");
      location.reload();
    }
  }

  function irARegistrar(camaId) {
    mostrarPanel("form");
    setModo("bit", document.querySelector(".mpk"));
    setTimeout(() => {
      let select = document.getElementById("camaBit");
      if (select) {
        select.value = camaId;
        select.dispatchEvent(new Event("change"));
      }
    }, 50);
  }

  function irAGestionHumana(joven) {
    mostrarPanel("form");
    setModo("gest", document.querySelectorAll(".mpk")[1]);
    setTimeout(() => {
      let select = document.getElementById("jovenGest");
      if (select) select.value = joven;
    }, 50);
  }

  function setModo(mod, btn) {
    modoActual = mod;
    document.querySelectorAll(".mpk").forEach(b => b.classList.remove("on"));
    if (btn) btn.classList.add("on");
    document.querySelectorAll(".fmod").forEach(d => d.style.display = "none");
    document.getElementById(`mod${mod.charAt(0).toUpperCase() + mod.slice(1)}`).style.display = "block";
  }

  // Inicialización
  function init() {
    document.getElementById("fechaForm").valueAsDate = new Date();
    let hoy = new Date();
    document.getElementById("saludo").innerText = (hoy.getHours() < 12 ? "Buenos días" : "Buenas tardes") + ", Jhon 👋";
    document.getElementById("fecha").innerText = hoy.toLocaleDateString("es-ES", { weekday: "long", day: "numeric", month: "long" });
    cargarDatosLocal();
    configurarAutoCompletado();
    // Cargar URL guardada
    apiURL = localStorage.getItem("apiURL") || "";
    if (apiURL) document.getElementById("apiUrl").value = apiURL;
  }

  init();
</script>
</body>
</html>
