<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Huerta - Producción V12</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-12 font-sans">

    <header class="bg-green-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">🌱 ERP HUERTA V12</h1>
            <button id="btnTest" onclick="testConexion()" class="bg-white text-green-700 px-3 py-1 rounded-full text-xs font-semibold shadow hover:bg-green-50 transition">
                Test API 🔍
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4">
        <div id="statusAlert" class="hidden mb-4 p-3 rounded-lg text-sm text-center font-medium shadow"></div>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-4">
            <label class="block text-gray-700 font-bold mb-2 text-sm">Selecciona el Módulo de Registro:</label>
            <select id="tipoRegistro" onchange="cambiarModulo()" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 text-gray-900 focus:ring-green-500 focus:border-green-500 font-medium">
                <option value="Bitacora Diaria">📝 Bitácora Diaria (Camas/Cultivos)</option>
                <option value="Gestion Humana">👥 Gestión Humana (Asistencia/Tareas)</option>
                <option value="Riego_Fumigacion">💧 Riego y Fumigación</option>
                <option value="Cosechas">🧺 Cosechas</option>
                <option value="Insumos">📦 Insumos (Entradas/Salidas)</option>
            </select>
        </div>

        <form id="erpForm" onsubmit="enviarDatos(event)" class="space-y-4">
            
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <label class="block text-gray-700 font-semibold mb-1 text-sm">Fecha de Registro:</label>
                <input type="date" id="fecha" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm">
            </div>

            <div id="mod-Bitacora" class="modulo-form bg-white p-4 rounded-xl shadow-sm space-y-3">
                <h3 class="text-green-700 font-bold border-b pb-1 text-sm uppercase tracking-wider">Bitácora Diaria</h3>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">ID Cama / Área:</label>
                    <input type="text" id="bit_camaId" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Cama 01">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Huerta / Sede:</label>
                    <input type="text" id="bit_huerta" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Zona Principal">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Cultivo:</label>
                    <input type="text" id="bit_cultivo" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Tomate">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Tipo Origen:</label>
                    <input type="text" id="bit_origen" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Semillero propio">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Fase del Cultivo:</label>
                    <input type="text" id="bit_fase" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Crecimiento">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">% Avance Estimado:</label>
                        <input type="number" id="bit_avance" min="0" max="100" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="0-100">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Altura Promedio (cm):</label>
                        <input type="number" id="bit_altura" step="0.1" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="En cm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Estado Fitosanitario:</label>
                        <select id="bit_estadoFitosan" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm">
                            <option value="Sano">Sano 🟢</option>
                            <option value="Plaga Controlada">Plaga Controlada 🟡</option>
                            <option value="Plaga Crítica">Plaga Crítica 🔴</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Humedad Suelo:</label>
                        <select id="bit_humedad" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm">
                            <option value="Óptima">Óptima💧</option>
                            <option value="Seco">Seco 🪵</option>
                            <option value="Saturado">Saturado 🌧️</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Acción Realizada:</label>
                    <input type="text" id="bit_accion" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Deshierbe">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Responsable:</label>
                    <input type="text" id="bit_responsable" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Nombre del operador">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">⚠️ Alerta Especial:</label>
                    <input type="text" id="bit_alerta" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Presencia de babosas">
                </div>
            </div>

            <div id="mod-GestionHumana" class="modulo-form hidden bg-white p-4 rounded-xl shadow-sm space-y-3">
                <h3 class="text-green-700 font-bold border-b pb-1 text-sm uppercase tracking-wider">Gestión Humana</h3>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Nombre del Joven:</label>
                    <input type="text" id="gh_joven" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Nombre completo">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Asistencia:</label>
                    <select id="gh_asistencia" onchange="toggleAsistenciaCampos()" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm">
                        <option value="Presente">Presente 🟢</option>
                        <option value="Ausente">Ausente 🔴</option>
                    </select>
                </div>
                <div id="camposAsistencia" class="space-y-3">
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Cama / Área Asignada:</label>
                        <input type="text" id="gh_camaAsignada" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Área de trabajo hoy">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Tarea Asignada:</label>
                        <input type="text" id="gh_tarea" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Preparación de sustrato">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Actitud / Desempeño (1-5):</label>
                        <input type="number" id="gh_actitud" min="1" max="5" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Calificación 1 al 5">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-gray-600 text-xs font-semibold">Herramienta Entregada:</label>
                            <input type="text" id="gh_herramienta" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Pala">
                        </div>
                        <div>
                            <label class="block text-gray-600 text-xs font-semibold">Estado de Entrega:</label>
                            <select id="gh_estadoHerr" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm">
                                <option value="Buen Estado">Buen Estado 🟢</option>
                                <option value="Dañada">Dañada 🔴</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Insumo Entregado a Cargo:</label>
                        <input type="text" id="gh_insumo" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: 2kg de Compost">
                    </div>
                </div>
            </div>

            <div id="mod-Riego" class="modulo-form hidden bg-white p-4 rounded-xl shadow-sm space-y-3">
                <h3 class="text-green-700 font-bold border-b pb-1 text-sm uppercase tracking-wider">Riego y Fumigación</h3>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Huerta / Sede:</label>
                    <input type="text" id="rf_huerta" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Área general">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Tipo Operación:</label>
                    <select id="rf_tipoOperacion" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm">
                        <option value="Riego">Riego 💧</option>
                        <option value="Fumigación Orgánica">Fumigación Orgánica 🌿</option>
                        <option value="Fertilización">Fertilización 🧪</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">ID Cama / Área:</label>
                        <input type="text" id="rf_camaId" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Cama afectada">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Cultivo Principal:</label>
                        <input type="text" id="rf_cultivo" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Tipo planta">
                    </div>
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Responsable:</label>
                    <input type="text" id="rf_responsable" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Nombre del aplicador">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Producto / Método Utilizado:</label>
                    <input type="text" id="rf_producto" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Purín de ortiga">
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-2">
                        <label class="block text-gray-600 text-xs font-semibold">Dosis / Cantidad:</label>
                        <input type="number" step="0.01" id="rf_cantidad" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Número">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Unidad:</label>
                        <input type="text" id="rf_unidad" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Litros">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Tiempo (minutos):</label>
                        <input type="number" id="rf_tiempo" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Duración">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Cobertura:</label>
                        <input type="text" id="rf_cobertura" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Total, Foliar">
                    </div>
                </div>
            </div>

            <div id="mod-Cosechas" class="modulo-form hidden bg-white p-4 rounded-xl shadow-sm space-y-3">
                <h3 class="text-green-700 font-bold border-b pb-1 text-sm uppercase tracking-wider">Cosechas</h3>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">ID Cama / Área:</label>
                    <input type="text" id="cos_camaId" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Lugar origen">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Huerta / Sede:</label>
                    <input type="text" id="cos_huerta" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ubicación">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Cultivo Cosechado:</label>
                    <input type="text" id="cos_cultivo" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Cilantro">
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-2">
                        <label class="block text-gray-600 text-xs font-semibold">Cantidad Total:</label>
                        <input type="number" step="0.01" id="cos_cantidad" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Total obtenido">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Unidad:</label>
                        <input type="text" id="cos_unidad" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Kg">
                    </div>
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Destino del Producto:</label>
                    <input type="text" id="cos_destino" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Venta, Autoconsumo">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Calidad Comercial:</label>
                    <select id="cos_calidad" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm">
                        <option value="Primera">Primera (Excelente) ✨</option>
                        <option value="Segunda">Segunda (Procesamiento) 🍏</option>
                        <option value="Rechazo">Rechazo (Compostaje) 🍂</option>
                    </select>
                </div>
            </div>

            <div id="mod-Insumos" class="modulo-form hidden bg-white p-4 rounded-xl shadow-sm space-y-3">
                <h3 class="text-green-700 font-bold border-b pb-1 text-sm uppercase tracking-wider">Control de Insumos</h3>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Nombre del Insumo:</label>
                    <input type="text" id="ins_insumoNombre" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Micorrizas">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Tipo de Insumo:</label>
                    <input type="text" id="ins_tipoInsumo" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Sustrato, Semilla">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Proveedor / Origen:</label>
                    <input type="text" id="ins_proveedor" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="De dónde vino">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Precio Unitario ($):</label>
                        <input type="number" step="0.01" id="ins_precio" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Costo unidad">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Unidad Medida:</label>
                        <input type="text" id="ins_unidadInsumo" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Bulto, Litro">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 bg-gray-50 p-2 rounded-lg border">
                    <div>
                        <label class="block text-green-700 text-xs font-bold">Cant. ENTRADA (+):</label>
                        <input type="number" step="0.01" id="ins_cantEntrada" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ingreso">
                    </div>
                    <div>
                        <label class="block text-red-700 text-xs font-bold">Cant. SALIDA (-):</label>
                        <input type="number" step="0.01" id="ins_cantSalida" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm" placeholder="Uso/Gasto">
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm">
                <label class="block text-gray-700 font-semibold mb-1 text-sm">Observaciones Adicionales / Notas:</label>
                <textarea id="observaciones" rows="2" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Detalles extra de la jornada..."></textarea>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-xl shadow-md hover:bg-green-700 active:scale-[0.98] transition text-base">
                📤 Registrar en Sistema
            </button>
        </form>
    </main>

    <script>
        // URL ACTUALIZADA Y AUTORIZADA DE TU GOOGLE APPS SCRIPT
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyMUFqHWaWgWuV4zgtBkudJeRcdk9rId9duIe1rWKvkz3UhYS147vjbw7m92aIhk7XE/exec";

        // Inicializar fecha
        document.getElementById('fecha').valueAsDate = new Date();

        function cambiarModulo() {
            const modulo = document.getElementById('tipoRegistro').value;
            document.querySelectorAll('.modulo-form').forEach(el => el.classList.add('hidden'));
            
            if (modulo === "Bitacora Diaria") document.getElementById('mod-Bitacora').classList.remove('hidden');
            if (modulo === "Gestion Humana") document.getElementById('mod-GestionHumana').classList.remove('hidden');
            if (modulo === "Riego_Fumigacion") document.getElementById('mod-Riego').classList.remove('hidden');
            if (modulo === "Cosechas") document.getElementById('mod-Cosechas').classList.remove('hidden');
            if (modulo === "Insumos") document.getElementById('mod-Insumos').classList.remove('hidden');
        }

        function toggleAsistenciaCampos() {
            const asistencia = document.getElementById('gh_asistencia').value;
            const campos = document.getElementById('camposAsistencia');
            if (asistencia === "Presente") {
                campos.classList.remove('hidden');
            } else {
                campos.classList.add('hidden');
            }
        }

        function showAlert(mensaje, esExito) {
            const el = document.getElementById('statusAlert');
            el.className = `mb-4 p-3 rounded-lg text-sm text-center font-medium shadow ${esExito ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
            el.innerText = mensaje;
            el.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // CONTROLADOR TEST API (GET)
        async function testConexion() {
            const btn = document.getElementById('btnTest');
            btn.innerText = "Conectando... ⏳";
            btn.disabled = true;
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                if (data.status === "online") {
                    showAlert(`Conexión exitosa 🟢 (Servidor ${data.version} Activo)`, true);
                } else {
                    showAlert("Fallo en la respuesta del servidor 🔴", false);
                }
            } catch (err) {
                showAlert("Fallo de conexión 🔴 Verifica la URL o historial de caché", false);
                console.error(err);
            } finally {
                btn.innerText = "Test API 🔍";
                btn.disabled = false;
            }
        }

        // ENVIAR FORMULARIO (POST)
        async function enviarDatos(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const tipoRegistro = document.getElementById('tipoRegistro').value;
            
            btn.innerText = "Enviando datos... ⏳";
            btn.disabled = true;

            // Estructura limpia del Payload base
            const payload = {
                tipoRegistro: tipoRegistro,
                fecha: document.getElementById('fecha').value,
                observaciones: document.getElementById('observaciones').value
            };

            // Mapeos explícitos usando selectores de ID únicos para evitar errores de sintaxis
            if (tipoRegistro === "Bitacora Diaria") {
                payload.camaId = document.getElementById('bit_camaId').value;
                payload.huerta = document.getElementById('bit_huerta').value;
                payload.cultivo = document.getElementById('bit_cultivo').value;
                payload.origen = document.getElementById('bit_origen').value;
                payload.fase = document.getElementById('bit_fase').value;
                payload.avance = document.getElementById('bit_avance').value;
                payload.altura = document.getElementById('bit_altura').value;
                payload.estadoFitosan = document.getElementById('bit_estadoFitosan').value;
                payload.humedad = document.getElementById('bit_humedad').value;
                payload.accion = document.getElementById('bit_accion').value;
                payload.responsable = document.getElementById('bit_responsable').value;
                payload.alerta = document.getElementById('bit_alerta').value;
            } 
            else if (tipoRegistro === "Gestion Humana") {
                payload.joven = document.getElementById('gh_joven').value;
                payload.asistencia = document.getElementById('gh_asistencia').value;
                payload.camaAsignada = document.getElementById('gh_camaAsignada').value;
                payload.tarea = document.getElementById('gh_tarea').value;
                payload.actitud = document.getElementById('gh_actitud').value;
                payload.herramienta = document.getElementById('gh_herramienta').value;
                payload.estadoHerr = document.getElementById('gh_estadoHerr').value;
                payload.insumo = document.getElementById('gh_insumo').value;
            } 
            else if (tipoRegistro === "Riego_Fumigacion") {
                payload.huerta = document.getElementById('rf_huerta').value;
                payload.tipoOperacion = document.getElementById('rf_tipoOperacion').value;
                payload.camaId = document.getElementById('rf_camaId').value;
                payload.cultivo = document.getElementById('rf_cultivo').value;
                payload.responsable = document.getElementById('rf_responsable').value;
                payload.producto = document.getElementById('rf_producto').value;
                payload.cantidad = document.getElementById('rf_cantidad').value;
                payload.unidad = document.getElementById('rf_unidad').value;
                payload.tiempo = document.getElementById('rf_tiempo').value;
                payload.cobertura = document.getElementById('rf_cobertura').value;
            } 
            else if (tipoRegistro === "Cosechas") {
                payload.camaId = document.getElementById('cos_camaId').value;
                payload.huerta = document.getElementById('cos_huerta').value;
                payload.cultivo = document.getElementById('cos_cultivo').value;
                payload.cantidad = document.getElementById('cos_cantidad').value;
                payload.unidad = document.getElementById('cos_unidad').value;
                payload.destino = document.getElementById('cos_destino').value;
                payload.calidad = document.getElementById('cos_calidad').value;
            } 
            else if (tipoRegistro === "Insumos") {
                payload.insumo = document.getElementById('ins_insumoNombre').value;
                payload.tipoInsumo = document.getElementById('ins_tipoInsumo').value;
                payload.proveedor = document.getElementById('ins_proveedor').value;
                payload.precio = document.getElementById('ins_precio').value;
                payload.unidad = document.getElementById('ins_unidadInsumo').value;
                payload.cantEntrada = document.getElementById('ins_cantEntrada').value;
                payload.cantSalida = document.getElementById('ins_cantSalida').value;
            }

            try {
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                showAlert("✅ ¡Registro enviado con éxito a la hoja de cálculo!", true);
                
                // Resetear campos de texto de manera limpia
                document.getElementById('observaciones').value = "";
                document.getElementById('erpForm').reset();
                document.getElementById('fecha').valueAsDate = new Date();
                cambiarModulo();

            } catch (error) {
                showAlert("❌ Error al enviar datos: " + error.message, false);
                console.error(error);
            } finally {
                btn.innerText = "📤 Registrar en Sistema";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
