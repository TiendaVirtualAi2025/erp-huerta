<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Huerta - Producción V12</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-12 font-sans">

    <header class="bg-green-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">🌱 ERP HUERTA V12</h1>
            <button id="btnTest" onclick="testConexion()" class="bg-white text-green-700 px-3 py-1 rounded-full text-xs font-semibold shadow hover:bg-green-50 transition">
                Test API 🔍
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4">
        <div id="statusAlert" class="hidden mb-4 p-3 rounded-lg text-sm text-center font-medium shadow"></div>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-4">
            <label class="block text-gray-700 font-bold mb-2 text-sm">Selecciona el Módulo de Registro:</label>
            <select id="tipoRegistro" onchange="cambiarModulo()" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 text-gray-900 focus:ring-green-500 focus:border-green-500 font-medium">
                <option value="Bitacora Diaria">📝 Bitácora Diaria (Camas/Cultivos)</option>
                <option value="Gestion Humana">👥 Gestión Humana (Asistencia/Tareas)</option>
                <option value="Riego_Fumigacion">💧 Riego y Fumigación</option>
                <option value="Cosechas">🧺 Cosechas</option>
                <option value="Insumos">📦 Insumos (Entradas/Salidas)</option>
            </select>
        </div>

        <form id="erpForm" onsubmit="enviarDatos(event)" class="space-y-4">
            
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <label class="block text-gray-700 font-semibold mb-1 text-sm">Fecha de Registro:</label>
                <input type="date" id="fecha" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm">
            </div>

            <div id="mod-Bitacora" class="modulo-form bg-white p-4 rounded-xl shadow-sm space-y-3">
                <h3 class="text-green-700 font-bold border-b pb-1 text-sm uppercase tracking-wider">Bitácora Diaria</h3>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">ID Cama / Área:</label>
                    <input type="text" name="camaId" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Cama 01, Semillero A">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Huerta / Sede:</label>
                    <input type="text" name="huerta" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Zona Principal">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Cultivo:</label>
                    <input type="text" name="cultivo" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Tomate, Cebolla">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Tipo Origen:</label>
                    <input type="text" name="origen" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Semillero propio, Donación">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Fase del Cultivo:</label>
                    <input type="text" name="fase" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Crecimiento, Floración">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">% Avance Estimado:</label>
                        <input type="number" name="avance" min="0" max="100" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="0-100">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Altura Promedio (cm):</label>
                        <input type="number" name="altura" step="0.1" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="En cm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Estado Fitosanitario:</label>
                        <select name="estadoFitosan" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm">
                            <option value="Sano">Sano 🟢</option>
                            <option value="Plaga Controlada">Plaga Controlada 🟡</option>
                            <option value="Plaga Crítica">Plaga Crítica 🔴</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Humedad Suelo:</label>
                        <select name="humedad" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm">
                            <option value="Óptima">Óptima💧</option>
                            <option value="Seco">Seco 🪵</option>
                            <option value="Saturado">Saturado 🌧️</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Acción Realizada:</label>
                    <input type="text" name="accion" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Deshierbe, Tutorado">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Responsable:</label>
                    <input type="text" name="responsable" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Nombre de quien reporta">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">⚠️ Alerta Especial:</label>
                    <input type="text" name="alerta" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Presencia de babosas">
                </div>
            </div>

            <div id="mod-GestionHumana" class="modulo-form hidden bg-white p-4 rounded-xl shadow-sm space-y-3">
                <h3 class="text-green-700 font-bold border-b pb-1 text-sm uppercase tracking-wider">Gestión Humana</h3>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Nombre del Joven:</label>
                    <input type="text" name="joven" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Nombre completo">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Asistencia:</label>
                    <select name="asistencia" id="asistenciaSelect" onchange="toggleAsistenciaCampos()" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm">
                        <option value="Presente">Presente 🟢</option>
                        <option value="Ausente">Ausente 🔴</option>
                    </select>
                </div>
                <div id="camposAsistencia" class="space-y-3">
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Cama / Área Asignada:</label>
                        <input type="text" name="camaAsignada" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Área de trabajo hoy">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Tarea Asignada:</label>
                        <input type="text" name="tarea" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Preparación de sustrato">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Actitud / Desempeño (1-5):</label>
                        <input type="number" name="actitud" min="1" max="5" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Calificación del 1 al 5">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-gray-600 text-xs font-semibold">Herramienta Entregada:</label>
                            <input type="text" name="herramienta" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Pala, Rastrillo">
                        </div>
                        <div>
                            <label class="block text-gray-600 text-xs font-semibold">Estado de Entrega:</label>
                            <select name="estadoHerr" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm">
                                <option value="Buen Estado">Buen Estado 🟢</option>
                                <option value="Dañada">Dañada 🔴</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Insumo Entregado a Cargo:</label>
                        <input type="text" name="insumo" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: 2kg de Compost">
                    </div>
                </div>
            </div>

            <div id="mod-Riego" class="modulo-form hidden bg-white p-4 rounded-xl shadow-sm space-y-3">
                <h3 class="text-green-700 font-bold border-b pb-1 text-sm uppercase tracking-wider">Riego y Fumigación</h3>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Huerta / Sede:</label>
                    <input type="text" name="huertaRiego" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Área general">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Tipo Operación:</label>
                    <select name="tipoOperacion" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm">
                        <option value="Riego">Riego 💧</option>
                        <option value="Fumigación Orgánica">Fumigación Orgánica 🌿</option>
                        <option value="Fertilización">Fertilización 🧪</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">ID Cama / Área:</label>
                        <input type="text" name="camaIdRiego" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Cama afectada">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Cultivo Principal:</label>
                        <input type="text" name="cultivoRiego" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Tipo planta">
                    </div>
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Responsable:</label>
                    <input type="text" name="responsableRiego" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Nombre del aplicador">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Producto / Método Utilizado:</label>
                    <input type="text" name="producto" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Agua lluvia, Purín de ortiga">
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-2">
                        <label class="block text-gray-600 text-xs font-semibold">Dosis / Cantidad:</label>
                        <input type="number" step="0.01" name="cantidadRiego" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Número">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Unidad:</label>
                        <input type="text" name="unidadRiego" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Litros, cc">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Tiempo (minutos):</label>
                        <input type="number" name="tiempo" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Duración">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Cobertura:</label>
                        <input type="text" name="cobertura" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Total, Foliar">
                    </div>
                </div>
            </div>

            <div id="mod-Cosechas" class="modulo-form hidden bg-white p-4 rounded-xl shadow-sm space-y-3">
                <h3 class="text-green-700 font-bold border-b pb-1 text-sm uppercase tracking-wider">Cosechas</h3>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">ID Cama / Área:</label>
                    <input type="text" name="camaIdCosecha" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Lugar origen">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Huerta / Sede:</label>
                    <input type="text" name="huertaCosecha" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ubicación">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Cultivo Cosechado:</label>
                    <input type="text" name="cultivoCosecha" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Cilantro, Zanahoria">
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-2">
                        <label class="block text-gray-600 text-xs font-semibold">Cantidad Total:</label>
                        <input type="number" step="0.01" name="cantidadCosecha" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Total obtenido">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Unidad:</label>
                        <input type="text" name="unidadCosecha" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Kg, Atados">
                    </div>
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Destino del Producto:</label>
                    <input type="text" name="destino" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Venta, Autoconsumo, Semilla">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Calidad Comercial:</label>
                    <select name="calidad" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm">
                        <option value="Primera">Primera (Excelente) ✨</option>
                        <option value="Segunda">Segunda (Procesamiento) 🍏</option>
                        <option value="Rechazo">Rechazo (Compostaje) 🍂</option>
                    </select>
                </div>
            </div>

            <div id="mod-Insumos" class="modulo-form hidden bg-white p-4 rounded-xl shadow-sm space-y-3">
                <h3 class="text-green-700 font-bold border-b pb-1 text-sm uppercase tracking-wider">Control de Insumos</h3>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Nombre del Insumo:</label>
                    <input type="text" name="insumoNombre" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Micorrizas, Malla Sombra">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Tipo de Insumo:</label>
                    <input type="text" name="tipoInsumo" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Sustrato, Herramienta, Semilla">
                </div>
                <div>
                    <label class="block text-gray-600 text-xs font-semibold">Proveedor / Origen:</label>
                    <input type="text" name="proveedor" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="De dónde vino">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Precio Unitario ($):</label>
                        <input type="number" step="0.01" name="precio" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Costo por unidad">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-xs font-semibold">Unidad Medida:</label>
                        <input type="text" name="unidadInsumo" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ej: Bulto, Litro, Unidad">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 bg-gray-50 p-2 rounded-lg border">
                    <div>
                        <label class="block text-green-700 text-xs font-bold">Cant. ENTRADA (+):</label>
                        <input type="number" step="0.01" name="cantEntrada" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm" placeholder="Ingreso">
                    </div>
                    <div>
                        <label class="block text-red-700 text-xs font-bold">Cant. SALIDA (-):</label>
                        <input type="number" step="0.01" name="cantSalida" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm" placeholder="Uso/Gasto">
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm">
                <label class="block text-gray-700 font-semibold mb-1 text-sm">Observaciones Adicionales / Notas:</label>
                <textarea id="observaciones" rows="2" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm" placeholder="Detalles extra de la jornada..."></textarea>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-xl shadow-md hover:bg-green-700 active:scale-[0.98] transition text-base">
                📤 Registrar en Sistema
            </button>
        </form>
    </main>

    <script>
        // URL FINAL DEL SERVIDOR DE GOOGLE PROPORCIONADA
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxAIr3Qg0twvTcxPXK1wbNZ5JGVVgtWvIn48_po0UiiCdLvHMvnumrj-9VYB9b7HD4Q/exec";

        // Al iniciar, setear fecha de hoy por defecto
        document.getElementById('fecha').valueAsDate = new Date();

        function cambiarModulo() {
            const modulo = document.getElementById('tipoRegistro').value;
            // Ocultar todos
            document.querySelectorAll('.modulo-form').forEach(el => el.classList.add('hidden'));
            
            // Mostrar seleccionado
            if (modulo === "Bitacora Diaria") document.getElementById('mod-Bitacora').classList.remove('hidden');
            if (modulo === "Gestion Humana") document.getElementById('mod-GestionHumana').classList.remove('hidden');
            if (modulo === "Riego_Fumigacion") document.getElementById('mod-Riego').classList.remove('hidden');
            if (modulo === "Cosechas") document.getElementById('mod-Cosechas').classList.remove('hidden');
            if (modulo === "Insumos") document.getElementById('mod-Insumos').classList.remove('hidden');
        }

        function toggleAsistenciaCampos() {
            const asistencia = document.getElementById('asistenciaSelect').value;
            const campos = document.getElementById('camposAsistencia');
            if (asistencia === "Presente") {
                campos.classList.remove('hidden');
            } else {
                campos.classList.add('hidden');
            }
        }

        function showAlert(mensaje, esExito) {
            const el = document.getElementById('statusAlert');
            el.className = `mb-4 p-3 rounded-lg text-sm text-center font-medium shadow ${esExito ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
            el.innerText = mensaje;
            el.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // CONTROLADOR TEST API (GET)
        async function testConexion() {
            const btn = document.getElementById('btnTest');
            btn.innerText = "Conectando... ⏳";
            btn.disabled = true;
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                if (data.status === "online") {
                    showAlert(`Conexión exitosa 🟢 (Servidor ${data.version} Activo)`, true);
                } else {
                    showAlert("Fallo en la respuesta del servidor 🔴", false);
                }
            } catch (err) {
                showAlert("Fallo de conexión 🔴 Verifica permisos o URL", false);
                console.error(err);
            } finally {
                btn.innerText = "Test API 🔍";
                btn.disabled = false;
            }
        }

        // ENVIAR FORMULARIO (POST)
        async function enviarDatos(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const tipoRegistro = document.getElementById('tipoRegistro').value;
            
            btn.innerText = "Enviando datos... ⏳";
            btn.disabled = true;

            // Construcción del paquete JSON según el módulo
            const payload = {
                tipoRegistro: tipoRegistro,
                fecha: document.getElementById('fecha').value,
                observaciones: document.getElementById('observaciones').value
            };

            const form = document.getElementById('erpForm');
            const formData = new FormData(form);

            if (tipoRegistro === "Bitacora Diaria") {
                payload.camaId = formData.get('camaId');
                payload.huerta = formData.get('huerta');
                payload.cultivo = formData.get('cultivo');
                payload.origen = formData.get('origen');
                payload.fase = formData.get('fase');
                payload.avance = formData.get('avance');
                payload.altura = formData.get('altura');
                payload.estadoFitosan = formData.get('estadoFitosan');
                payload.humedad = formData.get('humedad');
                payload.accion = formData.get('accion');
                payload.responsable = formData.get('responsable');
                payload.alerta = formData.get('alerta');
            } 
            else if (tipoRegistro === "Gestion Humana") {
                payload.joven = formData.get('joven');
                payload.asistencia = formData.get('asistencia');
                payload.camaAsignada = formData.get('camaAsignada');
                payload.tarea = formData.get('tarea');
                payload.actitud = formData.get('actitud');
                payload.herramienta = formData.get('herramienta');
                payload.estadoHerr = formData.get('estadoHerr');
                payload.insumo = formData.get('insumo');
            } 
            else if (tipoRegistro === "Riego_Fumigacion") {
                payload.huerta = formData.get('huertaRiego');
                payload.tipoOperacion = formData.get('tipoOperacion');
                payload.camaId = formData.get('camaIdRiego');
                payload.cultivo = formData.get('cultivoRiego');
                payload.responsable = formData.get('responsableRiego');
                payload.producto = formData.get('producto');
                payload.cantidad = formData.get('cantidadRiego');
                payload.unidad = formData.get('unidadRiego');
                payload.tiempo = formData.get('tiempo');
                payload.cobertura = formData.get('cobertura');
            } 
            else if (tipoRegistro === "Cosechas") {
                payload.camaId = formData.get('camaIdCosecha');
                payload.huerta = formData.get('huertaCosecha');
                payload.cultivo = formData.get('cultivoCosecha');
                payload.cantidad = formData.get('cantidadCosecha');
                payload.unidad = formData.get('unidadCosecha');
                payload.destino = formData.get('destino');
                payload.calidad = formData.get('calidad');
            } 
            else if (tipoRegistro === "Insumos") {
                payload.insumo = formData.get('insumoNombre');
                payload.tipoInsumo = formData.get('tipoInsumo');
                payload.proveedor = formData.get('proveedor');
                payload.precio = formData.get('precio');
                payload.unidad = formData.get('unidadInsumo');
                payload.cantEntrada = formData.get('cantEntrada');
                payload.cantSalida = formData.get('cantSalida');
            }

            try {
                // Envío seguro cross-origin a Apps Script
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors", // Evita bloqueos de CORS en navegadores móviles
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                // Con 'no-cors' la respuesta llega opaca, asumimos éxito si no lanza error
                showAlert("✅ ¡Registro enviado con éxito a la hoja de cálculo!", true);
                
                // Limpiar campos variables
                document.getElementById('observaciones').value = "";
                form.reset();
                document.getElementById('fecha').valueAsDate = new Date();
                cambiarModulo();

            } catch (error) {
                showAlert("❌ Error al enviar datos: " + error.message, false);
                console.error(error);
            } finally {
                btn.innerText = "📤 Registrar en Sistema";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
